name: main pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  short:
    runs-on: ubuntu-latest
    outputs:
      SHORT_SHA: ${{ steps.short-sha.outputs.SHORT_SHA }}
    steps:
      - name: Get short SHA
        id: short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: 20
      run_tests: true

  docker:
    needs:
      - build-test
      - short
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "my-app"
      tags: '["latest", "sha-${{ needs.short.outputs.SHORT_SHA }}"]'
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

  scan:
    needs:
      - docker
      - short
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Scan Docker Image (table)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}"
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          scanners: vuln
        env:
          TRIVY_NO_PROGRESS: "true"

      - name: Generate SARIF report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}"
          format: sarif
          output: trivy-results.sarif
          scanners: vuln

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    needs:
      - docker
      - scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy step
        run: |
          echo "Deploying image: ${{ secrets.DOCKER_USERNAME }}/my-app:sha-${{ needs.short.outputs.SHORT_SHA }}"